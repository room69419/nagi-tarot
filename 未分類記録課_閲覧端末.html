<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記録閲覧端末</title>
<style>
:root{
  --bg:#070907;
  --ph:#a8c4a2;        /* 燐光グリーン */
  --ph-dim:#5a6f57;
  --amber:#c9b478;
  --red:#a03028;
  --line:#26302a;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--ph);
  font-family:"Courier New","Osaka-Mono","MS Gothic",monospace;
  font-size:15px;
  line-height:1.9;
  overflow:hidden;
}
/* ---- CRT質感 ---- */
.crt::before{
  content:"";
  position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0.22) 0 1px,transparent 1px 3px);
  pointer-events:none;z-index:50;
}
.crt::after{
  content:"";
  position:fixed;inset:0;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.55) 100%);
  pointer-events:none;z-index:51;
}
@keyframes flicker{
  0%,100%{opacity:1} 96%{opacity:1} 97%{opacity:.86} 98%{opacity:1} 99%{opacity:.93}
}
.screen{
  height:100%;
  padding:26px 20px 34px;
  max-width:760px;
  margin:0 auto;
  overflow-y:auto;
  animation:flicker 7s infinite;
  -webkit-overflow-scrolling:touch;
}
@media (prefers-reduced-motion:reduce){
  .screen{animation:none}
}
.hidden{display:none !important}

/* ---- 共通UI ---- */
.sys{color:var(--ph-dim);font-size:13px;letter-spacing:1px}
.hr{border:none;border-top:1px solid var(--line);margin:14px 0}
button{
  background:transparent;
  border:1px solid var(--ph-dim);
  color:var(--ph);
  font-family:inherit;
  font-size:14px;
  padding:10px 22px;
  cursor:pointer;
  letter-spacing:3px;
  transition:background .25s;
}
button:hover{background:rgba(168,196,162,.12)}
button:focus-visible{outline:1px solid var(--ph);outline-offset:3px}
.blink{animation:blink 1.1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
@media (prefers-reduced-motion:reduce){.blink{animation:none}}

/* ---- ファイル一覧 ---- */
.file-row{
  display:block;width:100%;
  text-align:left;
  border:none;border-bottom:1px solid var(--line);
  padding:14px 6px;
  font-size:15px;
  letter-spacing:1px;
  color:var(--ph);
}
.file-row:hover{background:rgba(168,196,162,.08)}
.file-row .tag{color:var(--ph-dim);font-size:12px;margin-left:8px}
.file-row.readdone .tag-read{color:var(--amber)}
.file-row.locked{color:var(--red)}
.file-row.locked:hover{background:rgba(160,48,40,.10)}

/* ---- 文書表示 ---- */
.doc{
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  font-size:15.5px;
  line-height:2.15;
  color:#c4cfc0;
  white-space:pre-wrap;
  padding-bottom:8px;
}
.doc .red{color:var(--red)}
.doc .dim{color:var(--ph-dim)}
.stamp{
  display:inline-block;
  border:2px solid var(--red);
  color:var(--red);
  padding:2px 10px;
  letter-spacing:6px;
  font-size:14px;
  transform:rotate(-2deg);
  margin:4px 0;
}
.backbar{margin-top:26px}

/* ---- 演出 ---- */
.glitch{animation:glitchAnim .18s steps(2) 3}
@keyframes glitchAnim{
  0%{transform:translateX(0)}
  25%{transform:translateX(-3px)}
  50%{transform:translateX(2px)}
  100%{transform:translateX(0)}
}
@media (prefers-reduced-motion:reduce){.glitch{animation:none}}
.warn{color:var(--red)}
.amber{color:var(--amber)}
.center{text-align:center}
.share-num{
  font-size:26px;
  letter-spacing:4px;
  color:var(--amber);
  text-align:center;
  margin:18px 0;
}
/* ---- タイトル画面 ---- */
.title-wrap{
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.title-org{
  font-size:15px;
  letter-spacing:12px;
  color:var(--ph-dim);
  margin-bottom:14px;
  text-indent:12px;
}
.title-main{
  font-size:34px;
  letter-spacing:14px;
  color:var(--ph);
  text-indent:14px;
  margin-bottom:10px;
  text-shadow:0 0 18px rgba(168,196,162,.25);
}
.title-sub{
  font-size:12px;
  letter-spacing:5px;
  color:var(--ph-dim);
  margin-bottom:54px;
}
.title-note{
  font-size:11px;
  letter-spacing:2px;
  color:var(--ph-dim);
  margin-top:46px;
}
@media (max-width:480px){
  .title-main{font-size:24px;letter-spacing:9px}
  .title-org{font-size:13px;letter-spacing:8px}
}

.sp-row{
  display:block;width:100%;
  text-align:left;
  border:1px solid rgba(160,48,40,.5);
  background:rgba(160,48,40,.05);
  padding:14px 10px;
  margin:10px 0;
  font-size:15px;
  letter-spacing:1px;
  color:var(--red);
  cursor:pointer;
  font-family:inherit;
}
.sp-row:hover{background:rgba(160,48,40,.14)}
.sp-row .tag{font-size:12px;opacity:.8;margin-left:8px}
.sp-locked{
  border:1px dashed rgba(160,48,40,.4);
  color:var(--ph-dim);
  padding:14px 10px;
  margin:10px 0;
  font-size:13px;
  letter-spacing:1px;
}
.sp-head{
  color:var(--red);
  font-size:13px;
  letter-spacing:6px;
  margin-top:26px;
}

.cert{
  border:1px solid var(--ph-dim);
  outline:1px solid var(--line);
  outline-offset:4px;
  padding:30px 22px 26px;
  margin:26px 0;
  text-align:center;
  position:relative;
  animation:certIn 1.6s ease both;

@keyframes certIn{
  0%{opacity:0; filter:brightness(3)}
  8%{opacity:1; filter:brightness(.4)}
  12%{filter:brightness(2.2)}
  18%{filter:brightness(1)}

  letter-spacing:8px;

.cert .cert-num{

  letter-spacing:5px;

  text-align:center;

   未分類記録課 記録閲覧端末
   構成：起動 → 一覧 → 記録閲覧(3件) → 異常記録出現 → 終端
   ========================================================= */

const $s = document.getElementById("screen");

/* ---------- 効果音（Web Audio API） ---------- */
let AC=null;
function audioCtx(){
  if(!AC){
    try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; }
  }
  if(AC && AC.state==="suspended") AC.resume();
  return AC;
}
function tone(freq,dur,type,vol){
  const ctx=audioCtx(); if(!ctx) return;
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.type=type; o.frequency.value=freq;
  o.connect(g); g.connect(ctx.destination);
  const t=ctx.currentTime;
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t); o.stop(t+dur);
}
/* ボタン押下音：古い端末のキー音 */
document.addEventListener("click",e=>{
  if(e.target.closest("button")) tone(420,0.05,"square",0.022);
},true);
/* 文字送りのカタカタ音 */
function tick(){ tone(1300,0.008,"square",0.006); }
/* 異常記録用の警告音 */
function warnTone(){
  tone(150,0.5,"sawtooth",0.03);
  setTimeout(()=>tone(110,0.8,"sawtooth",0.035),420);
}

const state = {
  read: {},            // 今回接続分の閲覧済み管理
  order: [],           // 閲覧順
  openTimes: {},       // 各記録を開いた時刻
  connectedAt: new Date(),
  anomalyShown: false,
  viewerNum: String(Math.floor(Math.random()*100)+900)
};
/* 再接続をまたいで蓄積される閲覧アーカイブ */
const ARCHIVE = {};

/* ---------- ユーティリティ ---------- */
function fmt(d){
  const p=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
function el(html){
  const t=document.createElement("template");
  t.innerHTML=html.trim();
  return t.content.firstChild;
}
function clear(){ $s.innerHTML=""; $s.scrollTop=0; }
async function typeLines(lines, target, speed=26){
  for(const line of lines){
    const p=el(`<div class="sys"></div>`);
    target.appendChild(p);
    for(const ch of line){
      p.textContent+=ch;
      if(ch!==" "&&ch!=="　") tick();
      await sleep(speed);
    }
    await sleep(180);
  }
}
const sleep=(ms)=>new Promise(r=>setTimeout(r,ms));

/* 接続ごとにランダムで3件を選出する */
function pickRecords(){
  const shuffled=[...POOL].sort(()=>Math.random()-0.5);
  return shuffled.slice(0,3);
}
let RECORDS = pickRecords();

/* ---------- 画面：タイトル ---------- */
function titleScreen(){
  clear();
  const wrap=el(
    `<div class="title-wrap">
      <div class="title-org">未分類記録課</div>
      <div class="title-main">記録閲覧端末</div>
      <div class="title-sub">RECORD VIEWING TERMINAL</div>
      <div><button>接続する</button></div>
      <div class="title-note">※本端末の記録は全てフィクションです</div>
    </div>`);
  wrap.querySelector("button").onclick=bootScreen;
  $s.appendChild(wrap);
}

/* ---------- 画面：起動 ---------- */
async function bootScreen(){
  clear();
  const box=el(`<div></div>`);
  $s.appendChild(box);
  const lines=[
    "未分類記録課　記録閲覧端末",
    "システムを起動しています ...",
    "接続元を確認しています ...",
    "登録外の接続元です。",
    "閲覧権限を照会しています ...",
    "……",
    "仮権限が発行されました。",
    `権限区分：仮　　接続時刻：${fmt(state.connectedAt)}`
  ];
  if(reduced){
    lines.forEach(l=>box.appendChild(el(`<div class="sys">${l}</div>`)));
  }else{
    await typeLines(lines, box);
  }
  const btn=el(`<div class="backbar"><button>閲覧を開始する</button></div>`);
  btn.querySelector("button").onclick=listScreen;
  $s.appendChild(btn);
}

/* ---------- 画面：一覧 ---------- */
function listScreen(){
  clear();
  $s.appendChild(el(`<div class="sys">未分類記録課　記録閲覧端末</div>`));
  $s.appendChild(el(`<div class="sys">権限区分：仮　／　閲覧可能記録：一部のみ</div>`));
  $s.appendChild(el(`<div class="sys">収集済記録　${Object.keys(ARCHIVE).length}／${POOL.length}</div>`));
  $s.appendChild(el(`<hr class="hr">`));

  RECORDS.forEach(r=>{
    const read = state.read[r.id];
    const row=el(
      `<button class="file-row ${read?'readdone':''}">
        ${r.id}　${r.title}
        <span class="tag">[記録文書]</span>
        ${read?'<span class="tag tag-read">閲覧済</span>':''}
      </button>`);
    row.onclick=()=>docScreen(r);
    $s.appendChild(row);
  });

  /* 3件閲覧後に異常記録が出現する */
  const allRead = RECORDS.every(r=>state.read[r.id]);
  if(allRead){
    const anomaly=el(
      `<button class="file-row locked">
        UMR-██-███　<span class="warn">（件名未設定）</span>
        <span class="tag">[閲覧制限]</span>
      </button>`);
    anomaly.onclick=anomalyScreen;
    $s.appendChild(anomaly);
    if(!state.anomalyShown){
      state.anomalyShown=true;
      if(!reduced){
        anomaly.classList.add("glitch");
        setTimeout(()=>anomaly.classList.remove("glitch"),600);
      }
      $s.appendChild(el(`<div class="sys warn" style="margin-top:14px">※ 一覧に未登録の記録が検出されました。</div>`));
    }
  }else{
    $s.appendChild(el(`<div class="sys" style="margin-top:14px">※ 仮権限では上記のみ閲覧できます。</div>`));
  }

  /* ---- 特別保管記録 ---- */
  const got=Object.keys(ARCHIVE).length;
  $s.appendChild(el(`<div class="sp-head">─ 特別保管記録 ─</div>`));
  if(got>=SP_UNLOCK){
    SPECIAL.forEach(r=>{
      const read=SP_ARCHIVE[r.id];
      const row=el(
        `<button class="sp-row">
          ${r.id}　${r.title}
          <span class="tag">[第二種閲覧制限]</span>
          ${read?'<span class="tag">閲覧済</span>':''}
        </button>`);
      row.onclick=()=>specialDocScreen(r);
      $s.appendChild(row);
    });
    $s.appendChild(el(`<div class="sys">特別保管記録　${Object.keys(SP_ARCHIVE).length}／${SPECIAL.length}</div>`));
  }else{
    $s.appendChild(el(
      `<div class="sp-locked">▓▓▓▓▓▓▓▓▓▓▓▓▓▓<br>
      閲覧には第二種権限を要する。<br>
      解除条件：収集済記録 ${SP_UNLOCK}件（現在 ${got}件）</div>`));
  }
}

/* ---------- 画面：特別保管記録 ---------- */
async function specialDocScreen(r){
  clear();
  warnTone();
  const box=el(`<div></div>`);
  $s.appendChild(box);
  const pre=[
    "第二種権限を照会しています ...",
    "収集済記録を確認しています ...",
    "条件を満たしています。",
    "<span class='warn'>警告：本記録には、被害の記載が含まれる。</span>",
    "閲覧を許可します。"
  ];
  if(reduced){
    pre.forEach(l=>{const d=el(`<div class="sys"></div>`);d.innerHTML=l;box.appendChild(d);});
  }else{
    for(const line of pre){
      const p=el(`<div class="sys"></div>`);
      box.appendChild(p);
      const plain=line.replace(/<[^>]+>/g,"");
      for(const ch of plain){ p.textContent+=ch; if(ch!==" "&&ch!=="　")tick(); await sleep(28); }
      if(line.includes("warn")) p.innerHTML=`<span class="warn">${plain}</span>`;
      await sleep(200);
    }
  }
  await sleep(reduced?200:700);

  SP_ARCHIVE[r.id]=true;
  $s.appendChild(el(`<hr class="hr">`));
  $s.appendChild(el(`<div class="doc">${r.body}</div>`));
  $s.appendChild(el(`<hr class="hr">`));
  const back=el(`<div class="backbar"><button>一覧に戻る</button></div>`);
  back.querySelector("button").onclick=listScreen;
  $s.appendChild(back);
}

/* ---------- 画面：記録文書 ---------- */
function docScreen(r){
  state.read[r.id]=true;
  ARCHIVE[r.id]=true;
  if(!state.order.includes(r.id)) state.order.push(r.id);
  state.openTimes[r.id]=new Date();

  clear();
  $s.appendChild(el(`<div class="sys">記録文書を表示しています</div>`));
  $s.appendChild(el(`<hr class="hr">`));
  $s.appendChild(el(`<div class="doc">${r.body}</div>`));
  $s.appendChild(el(`<hr class="hr">`));
  const back=el(`<div class="backbar"><button>一覧に戻る</button></div>`);
  back.querySelector("button").onclick=listScreen;
  $s.appendChild(back);
}

/* ---------- 画面：異常記録 ---------- */
async function anomalyScreen(){
  clear();
  warnTone();
  const box=el(`<div></div>`);
  $s.appendChild(box);

  const pre=[
    "閲覧権限を確認しています ...",
    "権限がありません。",
    "……",
    "……権限を再照会しています ...",
    "一時許可が発行されました。",
    "発行元：不明"
  ];
  if(reduced){
    pre.forEach(l=>box.appendChild(el(`<div class="sys">${l}</div>`)));
  }else{
    await typeLines(pre, box, 30);
  }
  await sleep(600);

  /* 実際の行動ログを文書に反映する */
  const now=new Date();
  const stayMin=Math.max(1, Math.round((now - state.connectedAt)/60000));
  const orderText=state.order.map((id,i)=>`　　${i+1}．${id}`).join("\n");

  const body=
`記録番号　<span class="red">UMR-██-███</span>
記録件名　閲覧者

一、本端末に、登録外の接続が確認された。

一、対象は、以下の順序で記録を閲覧した。
${orderText}

一、接続時刻　${fmt(state.connectedAt)}
　　滞在時間　約${stayMin}分

一、対象は、現在もこの文書を閲覧している。

<span class="red">一、対象の記録化を開始する。</span>`;

  $s.appendChild(el(`<hr class="hr">`));
  $s.appendChild(el(`<div class="doc">${body}</div>`));
  $s.appendChild(el(`<hr class="hr">`));

  await sleep(reduced?600:2400);
  const btn=el(`<div class="backbar"><button class="warn" style="border-color:var(--red);color:var(--red)">閲覧を終了する</button></div>`);
  btn.querySelector("button").onclick=endScreen;
  $s.appendChild(btn);
}

/* ---------- 画面：終端 ---------- */
async function endScreen(){
  clear();
  const box=el(`<div></div>`);
  $s.appendChild(box);
  const lines=[
    "閲覧を終了しています ...",
    "……",
    "終了できません。",
    "記録の保存が完了していません。",
    "……",
    "……",
    "保存が完了しました。"
  ];
  if(reduced){
    lines.forEach(l=>box.appendChild(el(`<div class="sys">${l}</div>`)));
  }else{
    await typeLines(lines, box, 34);
  }
  await sleep(800);

  /* ---- 閲覧者記録の発行（単独シーン） ---- */
  const issue=el(`<div></div>`);
  $s.appendChild(issue);
  const issueLines=[
    "……",
    "対象の分類を判定しています ...",
    "分類コード：HM",
    ...(Object.keys(SP_ARCHIVE).length>0?["第二種閲覧歴：あり","番号帯を変更しています ..."]:[]),
    "閲覧者記録を発行しています ..."
  ];
  if(reduced){
    issueLines.forEach(l=>issue.appendChild(el(`<div class="sys">${l}</div>`)));
  }else{
    await sleep(700);
    await typeLines(issueLines, issue, 40);
  }
  await sleep(reduced?300:900);
  warnTone();

  const now=new Date();
  const got0=Object.keys(ARCHIVE).length;
  const spGot=Object.keys(SP_ARCHIVE).length;
  /* 特別保管記録の閲覧歴がある場合、600番台の記録番号が発行される */
  state.viewerNum=String(Math.floor(Math.random()*100)+(spGot>0?600:900));
  const spRow = spGot>0
    ? `<div class="cert-row"><span class="k">特別保管記録</span><span class="warn">${spGot}／${SPECIAL.length}　閲覧歴あり</span></div>`
    : "";
  const kubun = spGot>0 ? "第二種　→　<span class='warn'>要監視対象</span>" : "仮　→　記録対象";
  const cert=el(
    `<div class="cert">
      <div class="cert-stamp">発行済</div>
      <div class="cert-head">閲覧者記録　発行証</div>
      <div class="center sys">あなたは記録されました</div>
      <div class="cert-num">UMR-HM-${state.viewerNum}</div>
      <div class="cert-row"><span class="k">分類コード</span><span>HM（ヒト）</span></div>
      <div class="cert-row"><span class="k">発行日時</span><span>${fmt(now)}</span></div>
      <div class="cert-row"><span class="k">権限区分</span><span>${kubun}</span></div>
      <div class="cert-row"><span class="k">収集済記録</span><span>${got0}／${POOL.length}</span></div>
      ${spRow}
      <div class="cert-row"><span class="k">保管期限</span><span class="warn">設定されていない</span></div>
      <div class="cert-foot">本記録は未分類記録課にて管理されます</div>
    </div>`);
  $s.appendChild(cert);
  if(!reduced){
    cert.scrollIntoView({behavior:"smooth",block:"center"});
  }

  await sleep(reduced?400:2000);
  const nextBtn=el(`<div class="backbar center"><button>確認した</button></div>`);
  $s.appendChild(nextBtn);
  await new Promise(resolve=>{ nextBtn.querySelector("button").onclick=()=>{ nextBtn.remove(); resolve(); }; });

  $s.appendChild(el(`<hr class="hr">`));

  /* ---- 外部共有 ---- */
  const got=Object.keys(ARCHIVE).length, total=POOL.length;
  /* ▼▼ 公開時にサイトURLへ差し替えてください ▼▼ */
  const SITE_URL="";
  /* ▲▲ ここまで ▲▲ */
  const spShare=Object.keys(SP_ARCHIVE).length;
  const shareText=
`未分類記録課の閲覧端末に接続し、記録されました。

閲覧者記録　UMR-HM-${state.viewerNum}
収集済記録　${got}／${total}${spShare>0?`
特別保管記録　${spShare}／${SPECIAL.length}`:""}

#未分類記録課`;
  const shareWrap=el(`<div class="links"></div>`);
  const xBtn=el(`<a href="https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText+(SITE_URL?"\n"+SITE_URL:""))}" target="_blank" rel="noopener">この記録を共有する（X）</a>`);
  shareWrap.appendChild(xBtn);
  if(navigator.share){
    const nBtn=el(`<a href="#">この記録を共有する（その他）</a>`);
    nBtn.onclick=(e)=>{
      e.preventDefault();
      navigator.share({text:shareText, url:SITE_URL||undefined}).catch(()=>{});
    };
    shareWrap.appendChild(nBtn);
  }

  /* ---- 端末そのものの共有 ---- */
  const toolUrl = SITE_URL || location.href;
  const toolText = "未分類記録課の記録閲覧端末への接続先です。\n閲覧には仮権限が発行されます。\n#未分類記録課";
  const tBtn=el(`<a href="#">この端末の接続先を共有する</a>`);
  tBtn.onclick=async(e)=>{
    e.preventDefault();
    if(navigator.share){
      try{ await navigator.share({text:toolText, url:toolUrl}); return; }catch(err){}
    }
    try{
      await navigator.clipboard.writeText(toolText+"\n"+toolUrl);
      tBtn.textContent="接続先を複写しました";
      setTimeout(()=>{ tBtn.textContent="この端末の接続先を共有する"; },2200);
    }catch(err){
      tBtn.textContent=toolUrl;
    }
  };
  shareWrap.appendChild(tBtn);
  $s.appendChild(shareWrap);
  $s.appendChild(el(`<hr class="hr">`));

  /* ▼▼ リンク先は公開時に差し替えてください ▼▼ */
  const links=el(
    `<div class="links">
      <a href="https://www.instagram.com/mibun_rui/?hl=ja" target="_blank" rel="noopener">関連映像記録（Instagram）</a>
      <a href="https://www.youtube.com/@%E6%9C%AA%E5%88%86%E9%A1%9E%E8%A8%98%E9%8C%B2%E8%AA%B2" target="_blank" rel="noopener">長編映像記録（YouTube）</a>
    </div>`);
  $s.appendChild(links);
  /* ▲▲ ここまで ▲▲ */

  $s.appendChild(el(`<div class="center sys" style="margin-top:20px">※本記録はフィクションです</div>`));

  const again=el(`<div class="backbar center"><button>再接続する</button></div>`);
  again.querySelector("button").onclick=()=>{
    /* ARCHIVE（収集済記録）は再接続後も保持される */
    state.read={}; state.order=[]; state.anomalyShown=false;
    state.connectedAt=new Date();
    state.viewerNum=String(Math.floor(Math.random()*100)+900);
    RECORDS = pickRecords();
    bootScreen();
  };
  $s.appendChild(again);
}

titleScreen();
</script>
